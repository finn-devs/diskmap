app-id: com.diskmap.app
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable//24.08
command: diskmap

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=host:ro    # Read-only access to scan all directories
  - --filesystem=home       # Read-write for trash operations
  - --talk-name=org.freedesktop.FileManager1  # Open in file manager

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin

modules:
  - name: diskmap
    buildsystem: simple
    build-commands:
      - cargo build --release -p dm-gtk
      - install -Dm755 target/release/diskmap /app/bin/diskmap
      - install -Dm644 packaging/diskmap.desktop /app/share/applications/diskmap.desktop
      - install -Dm644 packaging/diskmap.svg /app/share/icons/hicolor/scalable/apps/diskmap.svg
      - install -Dm644 packaging/diskmap.metainfo.xml /app/share/metainfo/com.diskmap.app.metainfo.xml
    sources:
      - type: dir
        path: ../
