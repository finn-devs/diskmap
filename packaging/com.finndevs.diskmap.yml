app-id: com.finndevs.diskmap
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: diskmap

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=host:ro
  - --filesystem=home
  - --talk-name=org.freedesktop.FileManager1

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin

modules:
  - name: diskmap
    buildsystem: simple
    build-commands:
      - mkdir -p .cargo && echo -e '[source.crates-io]\nreplace-with = "vendored-sources"\n[source.vendored-sources]\ndirectory = "vendor"' > .cargo/config.toml
      - cargo build --release -p dm-gtk
      - install -Dm755 target/release/diskmap /app/bin/diskmap
      - install -Dm644 packaging/com.finndevs.diskmap.desktop /app/share/applications/com.finndevs.diskmap.desktop
      - install -Dm644 packaging/com.finndevs.diskmap.svg /app/share/icons/hicolor/scalable/apps/com.finndevs.diskmap.svg
      - gtk-update-icon-cache -f /app/share/icons/hicolor/
      - install -Dm644 packaging/com.finndevs.diskmap.metainfo.xml /app/share/metainfo/com.finndevs.diskmap.metainfo.xml
    sources:
      - type: dir
        path: ../
